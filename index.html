<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工程進度管理系統</title>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<!-- SheetJS: try cdnjs first, fall back to unpkg, then cdn.sheetjs.com -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"
  onerror="loadXlsxFallback()"></script>
<script>
function loadXlsxFallback(){
  if(window.XLSX)return;
  console.warn('cdnjs SheetJS failed, trying unpkg...');
  const s=document.createElement('script');
  s.src='https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js';
  s.onerror=()=>{
    console.warn('unpkg failed, trying jsdelivr...');
    const s2=document.createElement('script');
    s2.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
    s2.onerror=()=>console.error('All SheetJS CDNs failed!');
    document.head.appendChild(s2);
  };
  document.head.appendChild(s);
}
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f8fafc;--bg2:#ffffff;--bg3:#cbd5e1;
  --blu:#2563eb;--tel:#0f766e;--pur:#7e22ce;--amb:#b45309;
  --txt:#0f172a;--mut:#475569;--dim:#94a3b8;
  --yel:#ca8a04;--red:#dc2626;--grn:#15803d;
}
body{background:var(--bg);color:var(--txt);
  font-family:'Noto Sans TC','Microsoft JhengHei','PingFang TC',sans-serif;min-height:100vh;}
.page{display:none;}
.page.active{display:block;}
#page-renov.active,#page-struct.active,#page-safety.active{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px;}

.btn{border:none;cursor:pointer;border-radius:6px;font-family:inherit;
  transition:filter .15s;font-size:13px;}
.btn:hover{filter:brightness(1.18);}
.bp{background:var(--blu);color:#fff;padding:8px 16px;font-weight:600;}
.bs{background:var(--bg3);color:var(--txt);padding:8px 16px;}
.bt{background:var(--tel);color:#fff;padding:8px 16px;}
.bsm{padding:5px 11px;font-size:11px;}
.bback{background:none;border:1px solid var(--bg3);color:var(--mut);
  padding:6px 14px;font-size:13px;border-radius:6px;cursor:pointer;}
.bback:hover{border-color:var(--mut);color:var(--txt);}

.inp{background:var(--bg2);border:1px solid var(--bg3);border-radius:6px;
  padding:8px 12px;color:var(--txt);font-size:13px;outline:none;font-family:inherit;}
.inp:focus{border-color:var(--blu);}
.lbl{display:flex;flex-direction:column;gap:6px;font-size:13px;color:var(--mut);}

.phdr{padding:10px 16px;display:flex;align-items:center;gap:10px;
  background:var(--bg2);border-bottom:1px solid var(--bg3);
  flex-shrink:0;flex-wrap:wrap;}
.phdr h1{margin:0;font-size:20px;font-weight:700;color:var(--txt);}

#ov{position:fixed;inset:0;background:rgba(15,23,42,.6);
  display:none;align-items:center;justify-content:center;z-index:300;padding:16px;}
#ov.open{display:flex;}
#mb{background:var(--bg2);border-radius:18px;padding:24px;width:100%;
  max-width:490px;max-height:92vh;overflow-y:auto;
  box-shadow:0 30px 60px rgba(15,23,42,.25);border:1px solid var(--bg3);}
#mb.wide{max-width:min(94vw,1080px);}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;gap:8px;}
.mh h2{margin:0;font-size:17px;color:var(--txt);font-weight:700;flex:1;}
.mcl{background:none;border:none;color:var(--dim);font-size:30px;
  cursor:pointer;line-height:1;padding:0;}
.mcl:hover{color:var(--txt);}

/* ── Popover Menu ── */
.dotbtn{background:#e2e8f0;color:#1e40af;border:none;border-radius:4px;
  padding:2px 6px;font-size:12px;cursor:pointer;font-family:inherit;line-height:1;}
.dotbtn:hover{background:#cbd5e1;color:#1e3a8a;}
.pop{position:fixed;background:var(--bg2);border:1px solid var(--bg3);
  border-radius:8px;box-shadow:0 12px 30px rgba(15,23,42,.25);padding:4px;
  display:none;z-index:350;min-width:130px;}
.pop.open{display:block;}
.pop button{display:block;width:100%;background:none;border:none;color:var(--txt);
  font-size:13px;padding:8px 12px;text-align:left;cursor:pointer;border-radius:4px;
  font-family:inherit;transition:background .12s;}
.pop button:hover{background:#f1f5f9;}
.pop button.dgr{color:#dc2626;}
.pop button.dgr:hover{background:#fee2e2;color:#991b1b;}
.pop hr{border:none;border-top:1px solid var(--bg3);margin:4px 0;}

/* ── Drag feedback ── */
.dragging{opacity:.4;}
.dropzone{outline:2px dashed #60a5fa !important;outline-offset:-2px;}

/* ── Home ── */
.hw{padding:24px 20px;max-width:1450px;margin:0 auto;}
.dh{text-align:center;margin-bottom:36px;padding-top:20px;}
.dlb{font-size:10px;color:var(--dim);letter-spacing:6px;margin-bottom:10px;
  text-transform:uppercase;font-weight:700;}
.dtx{font-size:26px;font-weight:700;color:#1e40af;letter-spacing:1px;}

.tsec{background:var(--bg2);border-radius:14px;padding:16px;
  margin-bottom:20px;border:1px solid var(--bg3);}
.tleg{display:flex;gap:14px;margin-bottom:12px;font-size:11px;
  color:var(--dim);flex-wrap:wrap;align-items:center;}
.twp{overflow-x:auto;}
.ttb{border-collapse:collapse;width:100%;min-width:920px;}
.ttb th{padding:8px 6px;text-align:center;font-size:11px;font-weight:700;
  border:1px solid var(--bg3);background:var(--bg2);color:var(--mut);min-width:150px;}
.ttb th.tc{background:#dbeafe;color:#1e40af;}
.ttb td{border:1px solid var(--bg3);vertical-align:top;
  background:#fff;padding:6px;min-height:96px;}
.ttb td.tc{background:#eff6ff;}

.ti{display:flex;align-items:center;gap:6px;margin-bottom:6px;
  font-size:11px;line-height:1.55;}
.ti .ck{flex-shrink:0;accent-color:#3b82f6;cursor:pointer;width:14px;height:14px;}
.ti .tx{flex:1;min-width:0;word-break:break-all;}
.ti .asg{display:inline-block;font-size:9px;color:#6d28d9;background:#ede9fe;
  padding:1px 5px;border-radius:3px;margin-left:3px;white-space:nowrap;}
.ti .acg{display:inline-flex;gap:2px;flex-shrink:0;align-items:center;}
.ti .ac{background:none;border:none;color:#94a3b8;cursor:pointer;
  font-size:13px;padding:2px 4px;line-height:1;border-radius:3px;
  width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;
  transition:background .12s,color .12s;}
.ti .ac:hover{color:var(--txt);background:#f1f5f9;}
.ti .ac.dgr:hover{color:#dc2626;background:#fee2e2;}
.ti .ac.cam:hover{color:#0891b2;background:#cffafe;}
.ti .ac.cam.has{color:#0891b2;background:#ecfeff;font-weight:700;}
.ti .ac .num{font-size:9px;margin-left:1px;}

.tadd{display:flex;gap:8px;margin-bottom:46px;flex-wrap:wrap;align-items:center;}
.nbts{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;}
.nbtn{border:none;cursor:pointer;border-radius:16px;padding:18px 42px;
  font-size:19px;font-weight:700;color:#fff;letter-spacing:2px;
  font-family:inherit;transition:transform .2s,box-shadow .2s;
  box-shadow:0 4px 24px rgba(0,0,0,.5);}
.nbtn:hover{transform:translateY(-3px);box-shadow:0 10px 36px rgba(0,0,0,.6);}

/* ── Renovation ── */
.rbdy{padding:16px;overflow:auto;flex:1;}
.rleg{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;
  font-size:11px;color:var(--dim);}
.rleg span{display:flex;align-items:center;gap:4px;}
.rtb{border-collapse:collapse;font-size:13px;}
.rtb th{background:var(--bg2);border:1px solid var(--bg3);
  padding:8px 10px;color:var(--mut);font-size:12px;font-weight:600;
  min-width:100px;text-align:center;}
.rtb th[draggable="true"]{cursor:grab;position:relative;}
.rtb th[draggable="true"]:active{cursor:grabbing;}
.rtb th.tlf{text-align:left;min-width:130px;}
.rtb td{border:1px solid var(--bg3);}
.rtb td.tnm{background:var(--bg2);padding:10px 12px;
  color:var(--txt);font-weight:600;position:relative;}
.rtb td.tnm[draggable="true"]{cursor:grab;}
.rtb td.tnm[draggable="true"]:active{cursor:grabbing;}
.rtb tr.sub-row td.sub-cell{background:#f8fafc;padding:6px 12px;border-left:3px solid #60a5fa;}
.rtb tr.sub-row td.pc{opacity:.92;}
.rtb tr.sub-row td.sub-pc .pcv{font-size:12px;padding:8px 4px;}
.unit-grid{display:flex;flex-wrap:wrap;gap:2px;justify-content:center;}
.unit-input{display:flex;flex-direction:column;align-items:center;gap:1px;
  background:rgba(255,255,255,.7);border-radius:3px;padding:2px 3px;min-width:36px;}
.unit-input .ulbl{font-size:9px;font-weight:600;color:#0f172a;line-height:1;}
.unit-input input{width:34px;border:1px solid #cbd5e1;background:#fff;
  padding:1px 2px;font-size:11px;text-align:center;color:#0f172a;
  border-radius:3px;font-family:inherit;outline:none;}
.unit-input input:focus{border-color:#2563eb;background:#eff6ff;}
.sub-btn{background:rgba(255,255,255,.85);border:1px solid #cbd5e1;border-radius:3px;
  padding:1px 5px;font-size:10px;cursor:pointer;font-family:inherit;color:#475569;}
.sub-btn:hover{background:#fff;color:#0f172a;}
.sub-btn.has{background:#fef3c7;color:#92400e;border-color:#fbbf24;font-weight:700;}
.sub-btn sup{font-size:8px;}
.rtb .exp-arrow{display:inline-flex;align-items:center;gap:4px;
  padding:2px 6px;border-radius:4px;transition:background .12s;}
.rtb .exp-arrow:hover{background:#dbeafe;}
.hdrow{display:flex;align-items:center;justify-content:center;gap:6px;}
.hdrow.lf{justify-content:flex-start;}
.pc{text-align:center;cursor:pointer;transition:filter .18s;}
.pc:hover{filter:brightness(1.45);}
.pc .pcv{padding:14px 4px;font-weight:700;font-size:14px;}

/* ── Structure ── */
.sbdy{overflow:auto;flex:1;position:relative;}
.gtb{border-collapse:collapse;font-size:11px;}
.gtb th{border:1px solid var(--bg3);padding:6px 8px;font-size:11px;
  color:var(--txt);text-align:center;vertical-align:top;position:sticky;top:0;z-index:20;}
.gtb th.gcn{position:sticky;top:0;left:0;z-index:30;background:var(--bg2);min-width:94px;}
.gtb th.gih{background:#dbeafe;color:#1e3a8a;min-width:96px;}
.gtb th.gfh{background:#cffafe;color:#0e7490;min-width:96px;}
.gtb td{border:1px solid #e2e8f0;height:22px;}
.gtb td.gdc{position:sticky;left:0;z-index:10;background:#fff;
  border:1px solid var(--bg3);padding:1px 7px;font-size:10px;color:var(--mut);
  white-space:nowrap;min-width:94px;}
.gtb tr.tdr td{background:#fef3c7 !important;}
.gtb tr.tdr td.gdc{background:#fef3c7 !important;color:#92400e;font-weight:700;}
.gtb tr.wkr{background:#f1f5f9;}
.gtb tr.wkr td.gdc{background:#f1f5f9;color:#94a3b8;}
.mrow td{background:#f1f5f9;border-bottom:1px solid var(--bg3);
  padding:4px 10px;font-size:11px;font-weight:700;color:#60a5fa;letter-spacing:3px;}
.bd{background:#7f1d1d;color:#fff;padding:2px 6px;font-size:9px;border-radius:3px;
  border:none;cursor:pointer;font-family:inherit;}
.bd:hover{filter:brightness(1.2);}

/* ── Cell matrix ── */
.ctb{border-collapse:collapse;font-size:12px;width:100%;}
.ctb th{background:var(--bg);border:1px solid var(--bg3);
  padding:6px 6px;color:var(--mut);text-align:center;font-size:12px;min-width:118px;}
.ctb th[draggable="true"]{cursor:grab;}
.ctb th[draggable="true"]:active{cursor:grabbing;}
.ctb th.clf{text-align:left;min-width:140px;}
.ctb td{border:1px solid var(--bg3);padding:3px;text-align:center;}
.ctb td.cnm{background:var(--bg);color:var(--txt);font-weight:600;
  text-align:left;padding:8px 10px;position:relative;}
.ctb td.cnm[draggable="true"]{cursor:grab;}
.ctb tr.avgr td{background:var(--bg);}
.pi{width:58px;background:#fff;border:1px solid #94a3b8;
  border-radius:4px;padding:3px;color:#0f172a;text-align:center;font-size:13px;
  font-family:inherit;font-weight:700;}
.pi:focus{outline:none;border-color:var(--blu);background:#eff6ff;}
.cwrap{display:flex;gap:2px;align-items:center;justify-content:center;}
.nbtc{background:none;color:#94a3b8;border:none;border-radius:4px;
  padding:0;font-size:13px;cursor:pointer;font-family:inherit;
  width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;
  position:relative;transition:color .12s,background .12s;}
.nbtc:hover{background:#f1f5f9;color:#0f172a;}
.nbtc.has{color:#0891b2;}
.nbtc.has:hover{background:#cffafe;}
.nbtc .num{position:absolute;top:-2px;right:-3px;background:#dc2626;color:#fff;
  font-size:8px;font-weight:700;padding:1px 3px;border-radius:6px;line-height:1;min-width:11px;text-align:center;}

.note{background:var(--bg);border:1px solid var(--bg3);border-radius:8px;
  padding:10px 12px;margin-bottom:8px;}
.note .nmt{display:flex;justify-content:space-between;align-items:center;
  font-size:10px;color:var(--dim);margin-bottom:4px;}
.note .ntx{color:var(--txt);font-size:13px;line-height:1.5;
  white-space:pre-wrap;word-break:break-word;}

.f{display:flex;}.fc{flex-direction:column;}.fw{flex-wrap:wrap;}
.ai{align-items:center;}.mla{margin-left:auto;}
.g2{gap:8px;}.g3{gap:12px;}.g4{gap:16px;}
.mt2{margin-top:8px;}.mt3{margin-top:12px;}.mt4{margin-top:16px;}

/* ── Photos ── */
.phs{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.ph{position:relative;width:64px;height:64px;border-radius:5px;overflow:hidden;
  background:#000;border:1px solid var(--bg3);cursor:pointer;flex-shrink:0;}
.ph img{width:100%;height:100%;object-fit:cover;}
.ph .pdel{position:absolute;top:1px;right:1px;background:rgba(127,29,29,.85);color:#fff;
  border:none;border-radius:3px;font-size:10px;padding:1px 4px;cursor:pointer;line-height:1;font-family:inherit;}
.ph.up{display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:10px;
  background:var(--bg);text-align:center;line-height:1.3;flex-direction:column;gap:2px;}
.ti .phs{margin-left:21px;}
.ti .phs .ph{width:48px;height:48px;}
.phbtn{background:var(--bg3);color:#7dd3fc;border:none;border-radius:4px;
  padding:3px 7px;font-size:10px;cursor:pointer;font-family:inherit;
  display:inline-flex;align-items:center;gap:3px;}
.phbtn:hover{background:#475569;color:#fff;}
.phbtn.has{background:#075985;color:#7dd3fc;}

/* Lightbox */
#lb{position:fixed;inset:0;background:rgba(0,0,0,.95);display:none;
  align-items:center;justify-content:center;z-index:500;padding:20px;cursor:zoom-out;}
#lb.open{display:flex;}
#lb img{max-width:96vw;max-height:92vh;object-fit:contain;border-radius:6px;
  box-shadow:0 10px 40px rgba(0,0,0,.6);}
#lb .lbinfo{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.7);color:#fff;padding:6px 14px;border-radius:20px;font-size:12px;}

/* ─────── Three-Week Schedule (Gantt) ─────── */
.sched-empty{text-align:center;padding:48px 24px;background:#fff;border-radius:8px;
  border:2px dashed #cbd5e1;color:#475569;}
.sched-empty .em-icon{font-size:48px;margin-bottom:12px;opacity:.6;}
.sched-empty h3{color:#0f172a;margin-bottom:8px;font-size:16px;}
.sched-empty p{font-size:13px;color:#475569;line-height:1.7;margin-bottom:14px;}

.sched-meta{background:#fff;border-radius:8px;padding:10px 14px;margin-bottom:10px;
  border:1px solid #e2e8f0;display:flex;flex-wrap:wrap;gap:12px;align-items:center;}
.sched-meta .meta-item{font-size:12px;color:#475569;}
.sched-meta .meta-item b{color:#0f172a;}

.sched-wrap{background:#fff;border-radius:8px;border:1px solid #e2e8f0;overflow:auto;}
.sched-tb{border-collapse:collapse;font-size:12px;width:100%;}
.sched-tb th,.sched-tb td{border:1px solid #cbd5e1;padding:5px 6px;text-align:center;
  white-space:nowrap;color:#0f172a;}
.sched-tb th{background:#e2e8f0;color:#0f172a;font-weight:700;font-size:13px;
  position:sticky;top:0;z-index:5;}
.sched-tb th.cat-h{width:60px;background:#e2e8f0;}
.sched-tb th.proj-h{width:220px;background:#e2e8f0;text-align:left;padding-left:12px;font-size:13px;}
.sched-tb th.dr-h{width:88px;font-size:12px;}
.sched-tb th.days-h{width:54px;background:#fed7aa;color:#7c2d12;font-size:13px;}
.sched-tb th.date-h{min-width:38px;padding:5px 3px;font-size:13px;font-weight:700;color:#0f172a;}
.sched-tb th.date-h.today{background:#fef3c7;color:#7c2d12;}
.sched-tb th.date-h.weekend{background:#f1f5f9;color:#475569;}
.sched-tb th.dow-h{font-size:12px;font-weight:700;color:#0f172a;background:#fff;}
.sched-tb th.dow-h.today{background:#fef3c7;color:#7c2d12;}
.sched-tb th.dow-h.weekend{color:#475569;background:#fafafa;}

.sched-tb td.cat-cell{background:#fef3c7;color:#7c2d12;font-weight:700;
  writing-mode:vertical-rl;text-orientation:upright;font-size:13px;width:36px;}
.sched-tb td.proj-cell{text-align:left;padding:6px 12px;color:#0f172a;
  font-weight:600;background:#fafafa;font-size:13px;}
.sched-tb td.dt-cell{font-size:11px;color:#0f172a;background:#fafafa;font-weight:500;}
.sched-tb td.days-cell{font-size:12px;color:#7c2d12;background:#fff7ed;font-weight:700;}
.sched-tb td.day-cell{padding:0;height:30px;width:38px;background:#fff;}
.sched-tb td.day-cell.weekend{background:#fafafa;}
.sched-tb td.day-cell.today{background:#fef3c7;}
.sched-tb td.day-cell.active{background:#0066cc;}
.sched-tb td.day-cell.active.today{background:#0050a0;}
.sched-tb tr.subhdr td{background:#fde68a;color:#7c2d12;text-align:left;
  padding:7px 14px;font-weight:700;font-size:13px;}

.sheet-pick-list{display:flex;flex-direction:column;gap:6px;max-height:60vh;overflow-y:auto;}
.sheet-pick-item{display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:#fff;border:1px solid #cbd5e1;border-radius:6px;cursor:pointer;
  transition:background .12s,border-color .12s;}
.sheet-pick-item:hover{background:#eff6ff;border-color:#60a5fa;}
.sheet-pick-item .spi-name{flex:1;font-weight:600;color:#0f172a;font-size:14px;}
.sheet-pick-item .spi-info{font-size:11px;color:#475569;}
.sheet-pick-item.recommended{background:#dbeafe;border-color:#2563eb;}
.sheet-pick-item.recommended::before{content:'⭐';margin-right:4px;}

/* ─────── Safety Cell ─────── */
.saf-cell{padding:0 !important;}
.saf-btn{width:100%;height:36px;border:none;cursor:pointer;font-size:18px;
  font-family:inherit;font-weight:700;display:flex;align-items:center;justify-content:center;
  transition:filter .12s;}
.saf-btn:hover{filter:brightness(0.95);}
.saf-btn.on{background:#dcfce7;color:#15803d;}
.saf-btn.off{background:#fee2e2;color:#dc2626;}
#page-safety.active{display:flex;flex-direction:column;height:100vh;overflow:hidden;}


/* Print: photos */
@media print{
  body.print-renov .ph,body.print-cell .ph{
    width:120px !important;height:120px !important;
    border:1px solid #9ca3af !important;}
  body.print-renov .ph .pdel,body.print-cell .ph .pdel,
  body.print-renov .ph.up,body.print-cell .ph.up,
  body.print-renov .phbtn,body.print-cell .phbtn{display:none !important;}
}

/* ── Print headers (hidden by default) ── */
.prthdr{display:none;}
.prtnotes{display:none;}

/* ══════════════ PRINT STYLES ══════════════ */
@media print{
  /* Landscape by default - more room for tables */
  @page{size:A4 landscape;margin:8mm;}
  html,body{background:white !important;color:#111 !important;width:100%;}
  *{-webkit-print-color-adjust:exact !important;
    color-adjust:exact !important;print-color-adjust:exact !important;}

  /* Hide everything first */
  body>*{display:none !important;}

  /* Hide filtered columns/rows in print */
  body.print-renov .hide-print,body.print-cell .hide-print{display:none !important;}

  /* ───── PRINT RENOVATION ───── */

// ══════════ UTILITIES ══════════
const DOW=['日','一','二','三','四','五','六'];
const uid=()=>Math.random().toString(36).slice(2,9);
const toS=d=>{
  if(!(d instanceof Date))return d;
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const dd=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
};
const toDt=s=>new Date(s+'T00:00:00');
const today=()=>toS(new Date());
const addD=(s,n)=>{const d=toDt(s);d.setDate(d.getDate()+n);return toS(d);};
const diffD=(a,b)=>Math.round((toDt(b)-toDt(a))/86400000);
const fmtS=s=>{const d=toDt(s);return `${d.getMonth()+1}/${d.getDate()}`;};
const fmtW=s=>{const d=toDt(s);return `${d.getMonth()+1}/${d.getDate()}(${DOW[d.getDay()]})`;};
const fmtL=s=>{const d=toDt(s);return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 星期${DOW[d.getDay()]}`;};
const fmtDT=s=>{const d=new Date(s);return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;};
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
function moveArr(arr,from,to){
  if(from===to||from<0||to<0||from>=arr.length||to>=arr.length)return false;
  const[it]=arr.splice(from,1);arr.splice(to,0,it);return true;
}

// ══════════ ROLLING WEEK ══════════
// Mon on left. Past days this week roll to next week.
function rollWeekDays(){
  const td=today();
  const dow=toDt(td).getDay(); // 0=Sun..6=Sat
  const daysSinceMon=dow===0?6:dow-1;
  const thisMon=addD(td,-daysSinceMon);
  return Array.from({length:7},(_,i)=>{
    let d=addD(thisMon,i);
    if(d<td)d=addD(d,7);
    return d;
  });
}

let _fbLastWrite=0;  // timestamp

function setSyncStatus(dot,txt,col){
  const d=document.getElementById('syncDot');
  const t=document.getElementById('syncTxt');
  if(d)d.style.background=col||'#64748b';

async function initFirebase(){
  const cfgRaw=localStorage.getItem('fbCfg');
  if(!cfgRaw){setSyncStatus('','雲端同步未啟用（僅存於本機）','#64748b');return;}
  try{
    const cfg=JSON.parse(cfgRaw);
    if(!window.firebase){setSyncStatus('','Firebase 載入失敗','#ef4444');return;}
    if(!firebase.apps.length){
      firebase.initializeApp(cfg.fb);
    }
    _fb=firebase.firestore();
    _syncEnabled=true;
    const docRef=_fb.collection('projects').doc(cfg.projectId||'main');
    setSyncStatus('','☁️ 連接中…','#eab308');

    // First-time fetch + realtime subscribe
    _fbUnsub=docRef.onSnapshot(snap=>{
      // Ignore our own writes for ~1.5s to avoid loop
      if(Date.now()-_fbLastWrite<1500)return;
      if(!snap.exists){
        // First push from this device
        pushToCloud(docRef);
        return;
      }
      const data=snap.data();
      if(data&&data.state){
        mergeFromCloud(data.state);
        setSyncStatus('','☁️ 已同步 · '+new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}),'#22c55e');
      }
    },err=>{
      console.error('Firestore error:',err);
      setSyncStatus('','⚠️ 同步錯誤：'+(err.code||err.message),'#ef4444');
    });
  }catch(e){
    console.error(e);
    setSyncStatus('','⚠️ 設定錯誤','#ef4444');
  }
}

async function pushToCloud(docRef){
  if(!_fb)return;
  try{
    _fbLastWrite=Date.now();
    const ref=docRef||_fb.collection('projects').doc((JSON.parse(localStorage.getItem('fbCfg')||'{}').projectId)||'main');
    await ref.set({
      state:S,
      updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
      updatedBy:(localStorage.getItem('fbUser')||'匿名'),
    });
    setSyncStatus('','☁️ 已同步 · '+new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}),'#22c55e');
  }catch(e){
    console.error(e);
    setSyncStatus('','⚠️ 上傳失敗','#ef4444');
  }
}

function mergeFromCloud(cloudState){
  // Cloud is authoritative. Replace local state.
  S=cloudState;
  // Ensure shape
  if(!S.renov_indoor)S.renov_indoor=JSON.parse(JSON.stringify(DEF.renov_indoor));
  if(!S.renov_outdoor)S.renov_outdoor=JSON.parse(JSON.stringify(DEF.renov_outdoor));
  if(!S.struct)S.struct=JSON.parse(JSON.stringify(DEF.struct));
  if(!S.todos)S.todos=[];
  if(!Array.isArray(S.others))S.others=[];
  if(!S.safety){S.safety=JSON.parse(JSON.stringify(DEF.safety));}
  else{
    if(!Array.isArray(S.safety.floors)||!S.safety.floors.length)S.safety.floors=DEF.safety.floors.slice();
    if(!Array.isArray(S.safety.items)||!S.safety.items.length)S.safety.items=JSON.parse(JSON.stringify(DEF.safety.items));
    if(!S.safety.cells)S.safety.cells={};
  }
  if(!S.renov_indoor.floorUnits)S.renov_indoor.floorUnits={};
  if(!S.renov_outdoor.floorUnits)S.renov_outdoor.floorUnits={};
  try{localStorage.setItem('capp4',JSON.stringify(S));}catch(e){}

// Compress image: max 1600px on longest side, JPEG quality 0.82
function compressImg(file){
  return new Promise((resolve,reject)=>{
    const fr=new FileReader();
    fr.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=1600;
        let w=img.width,h=img.height;
        if(w>MAX||h>MAX){
          if(w>h){h=Math.round(h*MAX/w);w=MAX;}
          else{w=Math.round(w*MAX/h);h=MAX;}
        }
        const cv=document.createElement('canvas');
        cv.width=w;cv.height=h;
        const ctx=cv.getContext('2d');
        ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);
        ctx.drawImage(img,0,0,w,h);
        cv.toBlob(blob=>{
          if(!blob){reject(new Error('壓縮失敗'));return;}
          resolve(blob);
        },'image/jpeg',0.82);
      };
      img.onerror=()=>reject(new Error('圖片解析失敗'));
      img.src=fr.result;
    };
    fr.onerror=()=>reject(new Error('讀取失敗'));
    fr.readAsDataURL(file);
  });
}

function blobToDataURL(blob){
  return new Promise((res,rej)=>{
    const fr=new FileReader();
    fr.onload=()=>res(fr.result);
    fr.onerror=()=>rej(new Error('讀取失敗'));
    fr.readAsDataURL(blob);
  });
}

async function uploadPhoto(file){
  // Returns photo object: {id, url, name, uploadedAt, uploadedBy, publicId?}
  if(!file.type.startsWith('image/'))throw new Error('檔案不是圖片');
  _uploadingCount++;updateUploadStatus();
  try{
    const blob=await compressImg(file);
    const photoId=uid();
    const photoObj={
      id:photoId,
      name:file.name||'photo.jpg',
      uploadedAt:new Date().toISOString(),
      uploadedBy:localStorage.getItem('fbUser')||'匿名',
    };
    const cldRaw=localStorage.getItem('cldCfg');
    if(cldRaw){
      // Upload to Cloudinary
      const cld=JSON.parse(cldRaw);
      const fd=new FormData();
      fd.append('file',blob,photoObj.name);
      fd.append('upload_preset',cld.uploadPreset);
      const res=await fetch(`https://api.cloudinary.com/v1_1/${cld.cloudName}/image/upload`,{
        method:'POST',body:fd
      });
      if(!res.ok){
        const err=await res.text();
        throw new Error('Cloudinary 上傳失敗：'+err);
      }
      const data=await res.json();
      photoObj.url=data.secure_url;
      photoObj.publicId=data.public_id;
      // Build a smaller thumbnail URL for display (Cloudinary auto-resize)
      photoObj.thumbUrl=data.secure_url.replace('/upload/','/upload/w_300,h_300,c_fill,q_auto/');
    }else{
      // Fallback: store as data URL in localStorage (small photos only!)
      photoObj.url=await blobToDataURL(blob);
      photoObj.thumbUrl=photoObj.url;
    }
    return photoObj;
  }finally{
    _uploadingCount--;updateUploadStatus();
  }
}

function updateUploadStatus(){
  if(_uploadingCount>0){
    setSyncStatus('','📸 上傳照片中（'+_uploadingCount+'）…','#eab308');
  }
}

// Photo handles registry — maps a string id to {get, render}
const _phHandles={};
function regPhotoHandle(handle,getOwner,onChange){
  _phHandles[handle]={getOwner,onChange};
}

async function addPhotoMenu(e,handle,useCamera){
  e&&e.stopPropagation();
  const h=_phHandles[handle];
  if(!h){alert('Handle 失效');return;}
  pickPhoto(useCamera,async files=>{
    if(!files||!files.length)return;
    for(const f of files){
      try{
        const photo=await uploadPhoto(f);
        const owner=h.getOwner();
        if(!owner){alert('資料失效');return;}
        if(!owner.photos)owner.photos=[];
        owner.photos.push(photo);
        save();
        h.onChange();
      }catch(err){
        alert('照片上傳失敗：'+err.message);
        console.error(err);
      }
    }
  });
}

async function delPhoto(handle,photoId){
  if(!confirm('確定刪除此照片？'))return;
  const h=_phHandles[handle];if(!h)return;
  const owner=h.getOwner();if(!owner||!owner.photos)return;
  const i=owner.photos.findIndex(p=>p.id===photoId);
  if(i<0)return;
  const photo=owner.photos[i];
  owner.photos.splice(i,1);
  save();
  h.onChange();
  // Async cleanup
  deletePhotoStorage(photo);
}

// ══════════ POPOVER MENU ══════════
let _popCtx=null; // {kind, idx, arr, onReorder, onDelete, label}
function openPop(e,ctx){
  e.stopPropagation();
  _popCtx=ctx;
  const pop=document.getElementById('pop');
  const r=e.currentTarget.getBoundingClientRect();
  const extras=ctx.extras||[];
  const H=150+extras.length*34;
  pop.style.top=Math.min(r.bottom+4,window.innerHeight-H-8)+'px';
  pop.style.left=Math.min(r.left,window.innerWidth-160)+'px';
  const isH=ctx.axis==='h';
  const extraHtml=extras.length
    ? `<hr>${extras.map((x,i)=>`<button onclick="popExtra(${i})">${esc(x.label)}</button>`).join('')}`
    : '';
  pop.innerHTML=`
    <button onclick="popMove(-1)">${isH?'◀ 左移':'▲ 上移'}</button>
    <button onclick="popMove(1)">${isH?'▶ 右移':'▼ 下移'}</button>
    <button onclick="popMove(-99)">⇤ 移到首位</button>
    <button onclick="popMove(99)">⇥ 移到末位</button>
    ${extraHtml}
    <hr>
    <button class="dgr" onclick="popDel()">🗑 刪除</button>
  `;
  pop.classList.add('open');
}
function closePop(){document.getElementById('pop').classList.remove('open');_popCtx=null;}
document.addEventListener('mousedown',(e)=>{
  const pop=document.getElementById('pop');
  if(pop.classList.contains('open')&&!pop.contains(e.target)&&!e.target.closest('.dotbtn'))closePop();
});
document.addEventListener('scroll',()=>closePop(),true);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePop();});

function popMove(dir){
  if(!_popCtx)return;
  const{arr,idx}=_popCtx;
  let to;
  if(dir===-99)to=0;
  else if(dir===99)to=arr.length-1;
  else to=idx+dir;
  if(moveArr(arr,idx,to)){save();_popCtx.onReorder();}
  closePop();
}
function popDel(){
  if(!_popCtx)return;
  const{onDelete}=_popCtx;
  closePop();
  onDelete();
}
function popExtra(i){
  if(!_popCtx)return;
  const fn=_popCtx.extras[i].fn;
  closePop();
  fn();
}

// ══════════ DRAG & DROP ══════════
let _drag=null;
function dragStart(e,kind,idx){
  _drag={kind,idx};
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',String(idx));
  e.currentTarget.classList.add('dragging');
}
function dragOver(e,kind,idx){
  if(!_drag||_drag.kind!==kind||_drag.idx===idx)return;
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  e.currentTarget.classList.add('dropzone');
}
function dragLeave(e){e.currentTarget.classList.remove('dropzone');}
function dragDrop(e,kind,idx,arr,onReorder){
  e.preventDefault();
  e.currentTarget.classList.remove('dropzone');
  if(!_drag||_drag.kind!==kind||_drag.idx===idx)return;
  if(moveArr(arr,_drag.idx,idx)){save();onReorder();}
  _drag=null;
}
function dragEnd(e){
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.dropzone').forEach(el=>el.classList.remove('dropzone'));
  _drag=null;
}

function renderHome(){

const getEff=t=>(!t.done&&t.date<today())?today():t.date;
const getDly=t=>{if(t.done)return 0;return Math.max(0,diffD(t.originalDate,getEff(t)));};
// Item is overdue if not done AND delay >= 2 days,
// OR if it WAS overdue but completed today (kept visible until midnight cleanup)
const isOverdue=t=>{
  if(!t.done)return getDly(t)>=2;
  return t.completedAt===today()&&t.wasOverdue;
};
// Overdue items DO NOT show in weekly grid
const dayItems=d=>S.todos.filter(t=>!isOverdue(t)&&getEff(t)===d);
const overdueItems=()=>S.todos.filter(isOverdue).sort((a,b)=>(a.originalDate||'').localeCompare(b.originalDate||''));

    return`<td class="${d===td?'tc':''}">${its.map(t=>{
      const dl=getDly(t);

      const dk=t.done?'line-through':'none';
      const np=(t.photos||[]).length;

      regPhotoHandle(handle,

        <input type="checkbox" class="ck"${t.done?' checked':''} onchange="togTodo('${t.id}')">
        <span class="tx" style="color:${cl};text-decoration:${dk};">${esc(t.text)}${

        }${t.assignee?`<span class="asg">@${esc(t.assignee)}</span>`:''}</span>
        <span class="acg">
          <button class="ac cam ${np?'has':''}" onclick="addPhotoMenu(event,'${handle}',true)" title="拍照">📷${np?`<span class="num">${np}</span>`:''}</button>
          <button class="ac" onclick="addPhotoMenu(event,'${handle}',false)" title="上傳照片">📁</button>
          <button class="ac" onclick="editTodo('${t.id}')" title="編輯">✎</button>

        </span>
      </div>${(t.photos&&t.photos.length)?`<div class="phs" style="margin-left:21px;margin-bottom:6px;">${t.photos.map(p=>`<div class="ph" style="width:48px;height:48px;" onclick="openLightbox('${esc(p.url)}','${esc(p.uploadedBy||'匿名')} · ${esc(fmtDT(p.uploadedAt))}')"><img src="${esc(p.thumbUrl||p.url)}" loading="lazy"><button class="pdel" onclick="event.stopPropagation();delPhoto('${handle}','${p.id}')">×</button></div>`).join('')}</div>`:''}`;
    }).join('')}</td>`;
  }).join('');

  renderOverdue();
  renderOthers();
}

function addOther(){
  const tx=document.getElementById('othTx').value.trim();
  const asg=document.getElementById('othAsg').value.trim();
  if(!tx)return;
  if(!Array.isArray(S.others))S.others=[];
  S.others.push({id:uid(),text:tx,assignee:asg,done:false,photos:[],createdAt:new Date().toISOString()});
  save();
  document.getElementById('othTx').value='';
  document.getElementById('othAsg').value='';
  renderOthers();
}
function togOther(id){
  const o=S.others.find(x=>x.id===id);if(!o)return;
  o.done=!o.done;save();renderOthers();
}
function updOther(id,field,val){
  const o=S.others.find(x=>x.id===id);if(!o)return;
  if(field==='text'&&!val.trim())return;
  o[field]=field==='text'?val.trim():val;
  save();
}
async function delOther(id){
  if(!confirm('確定刪除此交辦事項？'))return;
  const o=S.others.find(x=>x.id===id);
  S.others=S.others.filter(x=>x.id!==id);save();renderOthers();
  if(o&&o.photos)o.photos.forEach(p=>deletePhotoStorage(p));
}
document.getElementById('othTx').addEventListener('keydown',e=>{if(e.key==='Enter')addOther();});
document.getElementById('othAsg').addEventListener('keydown',e=>{if(e.key==='Enter')addOther();});

          onmouseover="this.style.background='#fee2e2';"

// Soft delete: same as toggling done (will be cleared by midnight cleanup)
function softDelOverdue(id){
  togTodo(id);
}

function updOvdField(id,field,val){
  const t=S.todos.find(x=>x.id===id);if(!t)return;
  if(field==='text'){if(!val.trim())return;t.text=val.trim();}
  else if(field==='originalDate'){
    if(!val)return;
    t.originalDate=val;
    // If original date changed, also update target date if it was equal
    if(t.date<val||t.date===t.originalDate)t.date=val;
  }
  else t[field]=val;
  save();renderTodos();
}
function addTodo(){
  const txt=document.getElementById('ttx').value.trim();
  const dt=document.getElementById('tdt').value||today();
  const asg=document.getElementById('tasg').value.trim();
  if(!txt)return;
  S.todos.push({id:uid(),text:txt,done:false,date:dt,originalDate:dt,assignee:asg,photos:[]});
  save();
  document.getElementById('ttx').value='';
  document.getElementById('tasg').value='';
  renderTodos();
}
function togTodo(id){
  const t=S.todos.find(x=>x.id===id);
  if(!t)return;
  // Detect overdue state BEFORE flipping done
  const wasOverdueBefore=getDly(t)>=2;
  t.done=!t.done;
  if(t.done){
    t.completedAt=today();
    t.wasOverdue=wasOverdueBefore;
  }else{
    delete t.completedAt;
    delete t.wasOverdue;
  }
  save();renderTodos();
}

// Cleanup completed todos from yesterday or earlier (called at startup and periodically)
function cleanupCompletedTodos(){
  const td=today();
  const before=S.todos.length;
  S.todos=S.todos.filter(t=>{
    if(t.done&&t.completedAt&&t.completedAt<td){
      // Cleanup photos from this todo
      if(t.photos)t.photos.forEach(p=>deletePhotoStorage(p));
      return false;
    }
    return true;
  });
  if(S.todos.length!==before){save();}
}
async function delTodo(id){
  if(!confirm('確定刪除此待辦事項及所有照片？'))return;
  const t=S.todos.find(x=>x.id===id);
  S.todos=S.todos.filter(x=>x.id!==id);save();renderTodos();
  if(t&&t.photos)t.photos.forEach(p=>deletePhotoStorage(p));
}
function editTodo(id){
  const t=S.todos.find(x=>x.id===id);if(!t)return;
  openModal('編輯待辦事項',`<div class="f fc g3">
    <label class="lbl">內容 <input id="etx" class="inp" value="${esc(t.text)}"></label>
    <label class="lbl">日期 <input type="date" id="edt" class="inp" value="${t.date}"></label>
    <label class="lbl">處理人員 <input id="easg" class="inp" value="${esc(t.assignee||'')}" placeholder="可留空"></label>
    <label style="display:flex;align-items:center;gap:6px;color:var(--mut);font-size:12px;cursor:pointer;margin-top:4px;">
      <input type="checkbox" id="erd" style="accent-color:#60a5fa;">
      重置延期（把原始日期也改為新日期，清除「N天前」標示）
    </label>
    <button class="btn bp" style="padding:10px;" onclick="doEditTodo('${esc(id)}')">儲存</button>
  </div>`);
}
function doEditTodo(id){
  const t=S.todos.find(x=>x.id===id);if(!t)return;
  const txt=document.getElementById('etx').value.trim();
  const dt =document.getElementById('edt').value;
  const asg=document.getElementById('easg').value.trim();
  const rd =document.getElementById('erd').checked;
  if(!txt||!dt){alert('內容與日期不可空白');return;}
  t.text=txt;t.date=dt;t.assignee=asg;

}
document.getElementById('ttx').addEventListener('keydown',e=>{if(e.key==='Enter')addTodo();});
document.getElementById('tasg').addEventListener('keydown',e=>{if(e.key==='Enter')addTodo();});

// ══════════ RENOVATION ══════════
const PC=[[0,'#f1f5f9'],[1,'#dbeafe'],[25,'#93c5fd'],[50,'#60a5fa'],[75,'#3b82f6'],[100,'#16a34a']];
const PCTXT=[[0,'#475569'],[1,'#1e40af'],[25,'#1e3a8a'],[50,'#fff'],[75,'#fff'],[100,'#fff']];
const pBg=p=>{for(let i=PC.length-1;i>=0;i--)if(p>=PC[i][0])return PC[i][1];return PC[0][1];};
const pTxt=p=>{for(let i=PCTXT.length-1;i>=0;i--)if(p>=PCTXT[i][0])return PCTXT[i][1];return PCTXT[0][1];};
const R=()=>S['renov_'+_renovKey];

// Floor-specific unit helpers
const getFlUnits=fl=>R().floorUnits?.[fl]?.list || R().units;
const getFlLabel=fl=>R().floorUnits?.[fl]?.label || R().unitLabel || '戶別';
const isCustomFl=fl=>!!R().floorUnits?.[fl];
// Returns reference to the editable units array (floor-specific if customized, else global)
const getEditableUnits=()=>{
  const fu=R().floorUnits?.[_fl];
  return fu?fu.list:R().units;
};

function getCell(fl,tid){
  const c=R().cells[`${fl}_${tid}`];
  if(!c)return{units:{},notes:{},photos:{}};
  if(!c.notes)c.notes={};
  if(!c.photos)c.photos={};
  return c;
}
function ensureCell(fl,tid){
  const k=`${fl}_${tid}`;
  if(!R().cells[k])R().cells[k]={units:{},notes:{},photos:{}};
  if(!R().cells[k].notes)R().cells[k].notes={};
  if(!R().cells[k].photos)R().cells[k].photos={};
  return R().cells[k];
}
function calcPct(cu,subs,units){
  const v=[];units.forEach(u=>subs.forEach(s=>v.push(cu?.[u]?.[s]??0)));
  return v.length?Math.round(v.reduce((a,b)=>a+b)/v.length):0;
}
function getCPct(fl,tid){
  const tr=R().trades.find(t=>t.id===tid);if(!tr)return 0;
  return calcPct(getCell(fl,tid).units,tr.subs,getFlUnits(fl));
}

function renderRenov(){
  const title=_renovKey==='indoor'?'室內裝修進度':'室外裝修進度';

    <button class="btn bt bsm" onclick="openAddFloor()">＋ 樓層</button></th>
  </tr></thead><tbody>`;

  trades.forEach((tr,ti)=>{
    const exp=!!tr.expanded;
    // Trade summary row (clickable to expand/collapse)
    h+=`<tr><td class="tnm trd-row" draggable="true"
      ondragstart="dragStart(event,'trade',${ti})"
      ondragover="dragOver(event,'trade',${ti})"
      ondragleave="dragLeave(event)"
      ondrop="dragDrop(event,'trade',${ti},R().trades,renderRenov)"

      </div></td>`;
    floors.forEach(fl=>{
      const p=getCPct(fl,tr.id);
      h+=`<td class="pc" style="background:${pBg(p)};color:${pTxt(p)};"
        onclick="openCell('${esc(fl)}','${esc(tr.id)}')"

        <div class="pcv">${p>0?p+'%':'—'}</div></td>`;
    });
    h+=`<td style="background:var(--bg);border:1px solid var(--bg3);"></td></tr>`;

    // Expanded sub-item rows
    if(exp){
      tr.subs.forEach(sub=>{

        </td>`;
        floors.forEach(fl=>{
          const p=getSubPct(fl,tr.id,sub);
          const cell=getCell(fl,tr.id);
          const units=getFlUnits(fl);
          const nc=units.reduce((sum,u)=>sum+(cell.notes?.[u]?.[sub]||[]).length,0);
          const np=units.reduce((sum,u)=>sum+(cell.photos?.[u]?.[sub]||[]).length,0);
          const badges=(nc||np)
            ? `<div style="position:absolute;top:2px;right:3px;display:flex;gap:2px;">
                ${nc?`<span style="background:#fef3c7;color:#92400e;font-size:8px;padding:1px 3px;border-radius:3px;font-weight:700;">📝${nc}</span>`:''}
                ${np?`<span style="background:#cffafe;color:#0e7490;font-size:8px;padding:1px 3px;border-radius:3px;font-weight:700;">📷${np}</span>`:''}
              </div>`
            : '';
          h+=`<td class="pc sub-pc" style="background:${pBg(p)};color:${pTxt(p)};position:relative;"
            onclick="openSubEdit('${esc(fl)}','${esc(tr.id)}','${esc(sub)}')"
            title="點擊編輯「${esc(fl)} - ${esc(tr.name)} - ${esc(sub)}」各戶進度">
            ${badges}
            <div class="pcv">${p>0?p+'%':'—'}</div></td>`;
        });
        h+=`<td style="background:var(--bg);border:1px solid var(--bg3);"></td></tr>`;
      });
    }
  });

  h+=`<tr>
    <td style="background:var(--bg);border:1px solid var(--bg3);padding:6px;">
      <button class="btn bp bsm" onclick="openAddTrade()">＋ 工種</button></td>
    ${floors.map(()=>`<td style="background:var(--bg);border:1px solid var(--bg3);"></td>`).join('')}
    <td style="background:var(--bg);border:1px solid var(--bg3);"></td>
  </tr></tbody>`;
  document.getElementById('rtb').innerHTML=h;
}

let _editSub='';

}
function renderSubEditView(){
  const tr=R().trades.find(t=>t.id===_tid);if(!tr)return;

    <div style="font-size:13px;color:var(--mut);">

  </div>

  <div style="overflow-x:auto;"><table class="ctb" style="width:100%;"><thead><tr>

        </button>

          📷 照片${np?` (${np})`:''}
        </button>
      </td>

  </tr></tbody></table></div>

  <div class="mt3" style="font-size:11px;color:var(--dim);">
    💡 直接修改各${esc(label)}的完成度，平均自動計算。
  </div>`;

  openModal(`${esc(_fl)} - ${esc(tr.name)} - ${esc(_editSub)}`,h,true);
}

function updSubEditCell(inp){
  const u=inp.dataset.unit;
  const v=Math.max(0,Math.min(100,parseInt(inp.value)||0));
  inp.value=v;
  const cell=ensureCell(_fl,_tid);
  if(!cell.units[u])cell.units[u]={};
  cell.units[u][_editSub]=v;
  save();

  // Update average shown in modal
  const avg=getSubPct(_fl,_tid,_editSub);
  const avgEl=document.getElementById('subEditAvg');
  if(avgEl)avgEl.textContent=avg+'%';

  // Update parent table cells
  const parentCell=document.querySelector(`[data-fl="${_fl}"][data-tid="${_tid}"]`);
  if(parentCell){
    const p=getCPct(_fl,_tid);
    parentCell.style.background=pBg(p);
    parentCell.style.color=pTxt(p);
    const pcv=parentCell.querySelector('.pcv');
    if(pcv)pcv.textContent=p>0?p+'%':'—';
  }
  // Refresh sub-row cells (since they show percentage)
  // Easiest is to re-render table; debounced
  clearTimeout(window._subRefresh);
  window._subRefresh=setTimeout(()=>renderRenov(),400);
}

function openNotesFromSubEdit(u){

function openPhotosFromSubEdit(u){

// Get progress percentage for a single sub-item across all units of a floor
function getSubPct(fl,tid,sub){
  const tr=R().trades.find(t=>t.id===tid);if(!tr)return 0;
  const cell=getCell(fl,tid);
  const units=getFlUnits(fl);
  const v=units.map(u=>cell.units?.[u]?.[sub]??0);
  return v.length?Math.round(v.reduce((a,b)=>a+b)/v.length):0;
}

function doAddSubToTrade(tid){
  const tr=R().trades.find(t=>t.id===tid);if(!tr)return;
  const inp=document.getElementById('atsName').value;
  const newSubs=inp.split(/[,，、\n]/).map(s=>s.trim()).filter(Boolean);
  if(!newSubs.length){alert('請輸入至少一個細項名稱');return;}
  const dupes=[],added=[];
  newSubs.forEach(n=>{
    if(tr.subs.includes(n))dupes.push(n);
    else{tr.subs.push(n);added.push(n);}
  });
  if(!added.length){alert('全部都已存在：'+dupes.join('、'));return;}
  tr.expanded=true; // auto expand to show new items
  save();fclose();renderRenov();
  if(dupes.length){
    setTimeout(()=>alert(`✓ 已新增 ${added.length} 個細項：${added.join('、')}\n（${dupes.join('、')} 已存在略過）`),100);
  }
}

function doRenameSub(tid,i,newName){
  const tr=R().trades.find(t=>t.id===tid);if(!tr||!tr.subs[i])return;
  newName=newName.trim();
  if(!newName)return;
  if(newName===tr.subs[i])return;
  if(tr.subs.includes(newName)){alert('名稱重複');return;}
  const oldName=tr.subs[i];
  tr.subs[i]=newName;
  // Migrate cell data: cells store unit→sub→percentage; need to rename `sub` keys
  Object.keys(R().cells).forEach(ck=>{
    if(!ck.endsWith('_'+tid))return;
    const cell=R().cells[ck];
    ['units','notes','photos'].forEach(kind=>{
      if(!cell[kind])return;
      Object.keys(cell[kind]).forEach(u=>{
        if(cell[kind][u]&&cell[kind][u][oldName]!==undefined){
          cell[kind][u][newName]=cell[kind][u][oldName];
          delete cell[kind][u][oldName];
        }
      });
    });
  });
  save();
}

function moveSubInTrade(tid,i,dir){
  const tr=R().trades.find(t=>t.id===tid);if(!tr)return;
  const ni=i+dir;
  if(ni<0||ni>=tr.subs.length)return;
  [tr.subs[i],tr.subs[ni]]=[tr.subs[ni],tr.subs[i]];
  save();
  openManageSubs(tid); // re-render
  // Re-render main table in background
  renderRenov();
}

function delSubFromTrade(tid,i){
  const tr=R().trades.find(t=>t.id===tid);if(!tr)return;
  const subName=tr.subs[i];
  if(tr.subs.length<=1){alert('至少要保留 1 個細項');return;}
  if(!confirm(`確定刪除細項「${subName}」？已輸入的相關進度資料也會一併移除。`))return;
  tr.subs.splice(i,1);
  // Also clean up cell data for this sub
  Object.keys(R().cells).forEach(ck=>{
    if(!ck.endsWith('_'+tid))return;
    const cell=R().cells[ck];
    ['units','notes','photos'].forEach(kind=>{
      if(!cell[kind])return;
      Object.keys(cell[kind]).forEach(u=>{
        if(cell[kind][u]&&cell[kind][u][subName]!==undefined){
          delete cell[kind][u][subName];
        }
      });
    });
  });
  save();
  openManageSubs(tid);
  renderRenov();
}

function doRenameFloor(oldName){
  const n=document.getElementById('rfn').value.trim();
  if(!n){alert('名稱不可空白');return;}
  if(n===oldName){fclose();return;}
  if(R().floors.includes(n)){alert('已存在相同名稱樓層');return;}
  // migrate floors list, floorUnits, cells keys
  const i=R().floors.indexOf(oldName);
  R().floors[i]=n;
  if(R().floorUnits?.[oldName]){R().floorUnits[n]=R().floorUnits[oldName];delete R().floorUnits[oldName];}
  Object.keys(R().cells).forEach(k=>{
    if(k.startsWith(oldName+'_')){
      const newK=n+k.slice(oldName.length);
      R().cells[newK]=R().cells[k];delete R().cells[k];
    }
  });
  save();fclose();renderRenov();
}

function bfPreset(label,csv){
  const lbl=document.getElementById('bfLbl');
  const lst=document.getElementById('bfList');
  if(lbl)lbl.value=label;
  if(lst)lst.value=csv.split(',').join('\n');

function bfGetSelFloors(){
  return Array.from(document.querySelectorAll('.bfCk:checked')).map(c=>c.dataset.fl);
}
function bfApply(){
  const sel=bfGetSelFloors();
  if(!sel.length){alert('請至少選擇一個樓層');return;}
  const label=document.getElementById('bfLbl').value.trim()||'戶別';
  const list=document.getElementById('bfList').value
    .split('\n').map(s=>s.trim()).filter(Boolean);
  if(!list.length){alert('項目清單不可空白');return;}
  const dup=list.filter((x,i)=>list.indexOf(x)!==i);
  if(dup.length){alert('項目名稱不可重複：'+dup[0]);return;}
  if(!R().floorUnits)R().floorUnits={};
  sel.forEach(fl=>{
    R().floorUnits[fl]={label,list:[...list]};
  });
  save();fclose();renderRenov();
  setTimeout(()=>alert(`✓ 已將 ${sel.length} 個樓層套用「${label}：${list.join('、')}」`),100);
}
function bfReset(){
  const sel=bfGetSelFloors();
  if(!sel.length){alert('請至少選擇一個樓層');return;}
  if(!confirm(`確定將 ${sel.length} 個樓層改回使用全域設定？`))return;
  if(!R().floorUnits)R().floorUnits={};
  sel.forEach(fl=>delete R().floorUnits[fl]);
  save();fclose();renderRenov();
  setTimeout(()=>alert(`✓ 已將 ${sel.length} 個樓層改回全域設定`),100);
}

let _fl='',_tid='',_unit='',_sub='';
let _noteOrigin=''; // 'matrix' or 'subEdit' — track where the user came from

function openCell(fl,tid){_fl=fl;_tid=tid;renderCellMatrix();}

function renderCellMatrix(){

    h+=`<th draggable="true"

  h+=`<th style="color:var(--mut);font-size:11px;font-weight:700;">橫向平均</th></tr></thead><tbody>`;

  tr.subs.forEach((s,si)=>{
    h+=`<tr><td class="cnm" draggable="true"
      ondragstart="dragStart(event,'sub',${si})"
      ondragover="dragOver(event,'sub',${si})"
      ondragleave="dragLeave(event)"
      ondrop="dragDrop(event,'sub',${si},R().trades.find(t=>t.id==='${_tid}').subs,renderCellMatrix)"
      ondragend="dragEnd(event)">
      <div class="hdrow lf">
        <span style="color:#0f172a;font-weight:700;">${esc(s)}</span>
        <button class="dotbtn" onclick="openSbMenu(event,${si})">⋮</button>
      </div></td>`;
    units.forEach((u,ui)=>{
      const v=cell.units?.[u]?.[s]??0;
      const nc=(cell.notes?.[u]?.[s]||[]).length;
      const np=(cell.photos?.[u]?.[s]||[]).length;
      h+=`<td><div class="cwrap">
        <input type="number" class="pi" min="0" max="100" value="${v}"
          data-si="${si}" data-ui="${ui}" oninput="updCell(this)">
        <button class="nbtc ${nc?'has':''}" onclick="openNotes('${esc(u)}','${esc(s)}')" title="備註">📝${nc?`<span class="num">${nc}</span>`:''}</button>

  units.forEach((u,ui)=>{

    h+=`<td id="ua${ui}" style="color:#15803d;font-weight:700;background:#f0fdf4;">${ua}%</td>`;

      : `此樓層使用<b style="color:#60a5fa;">全域</b>設定，增刪排序會影響所有用全域的樓層；點「⚙️ 設定」可改為此樓層專屬`}

function buildPrintNotes(cell,tr){
  let has=false,body='';
  const units=getFlUnits(_fl);
  units.forEach(u=>{
    tr.subs.forEach(s=>{
      const arr=cell.notes?.[u]?.[s]||[];
      if(arr.length){
        has=true;
        body+=`<div class="pnote"><b>${esc(u)} × ${esc(s)}</b>
          <ul style="margin:4px 0 0 18px;">
          ${arr.map(n=>`<li>[${esc(n.author||'匿名')} · ${fmtDT(n.createdAt)}] ${esc(n.text)}</li>`).join('')}
          </ul></div>`;
      }
    });
  });
  if(!has)return'';
  return`<div class="prtnotes"><h3>📝 備註列表</h3>${body}</div>`;
}

function calcRowAvg(cell,s,units){
  const v=units.map(u=>cell.units?.[u]?.[s]??0);
  return v.length?Math.round(v.reduce((a,b)=>a+b)/v.length):0;
}
function calcColAvg(cell,u,subs){
  const v=subs.map(s=>cell.units?.[u]?.[s]??0);
  return v.length?Math.round(v.reduce((a,b)=>a+b)/v.length):0;
}

function updCell(inp){
  const si=+inp.dataset.si,ui=+inp.dataset.ui;
  const v=Math.max(0,Math.min(100,parseInt(inp.value)||0));
  inp.value=v;
  const tr=R().trades.find(t=>t.id===_tid);if(!tr)return;
  const cell=ensureCell(_fl,_tid);
  const units=getFlUnits(_fl);
  const u=units[ui],s=tr.subs[si];
  if(!cell.units[u])cell.units[u]={};
  cell.units[u][s]=v;
  save();
  const saEl=document.getElementById('sa'+si);
  const uaEl=document.getElementById('ua'+ui);
  const totEl=document.getElementById('tot');
  if(saEl)saEl.textContent=calcRowAvg(cell,s,units)+'%';
  if(uaEl)uaEl.textContent=calcColAvg(cell,u,tr.subs)+'%';
  if(totEl)totEl.textContent=calcPct(cell.units,tr.subs,units)+'%';
  const gc=document.querySelector(`[data-fl="${_fl}"][data-tid="${_tid}"]`);
  if(gc){const p=getCPct(_fl,_tid);gc.style.background=pBg(p);gc.style.color=pTxt(p);gc.querySelector('.pcv').textContent=p>0?p+'%':'—';}
}

// ══════════ THREE-WEEK SCHEDULE (Excel Import) ══════════
function renderStruct(){
  const sched=S.schedule;
  const host=document.getElementById('schedHost');
  const inf=document.getElementById('sinf');

  if(!sched||!sched.items||!sched.items.length){
    inf.textContent='尚未上傳進度表';
    host.innerHTML=`<div class="sched-empty">
      <div class="em-icon">📊</div>
      <h3>尚未上傳進度表</h3>
      <p>點右上角「📤 上傳 Excel」匯入您的工程進度表 .xls / .xlsx 檔案。<br>
         系統會自動解析工項、起訖日期、進度色塊。</p>
      <button class="btn bp" style="padding:11px 24px;font-size:14px;" onclick="openExcelImport()">📤 立即上傳 Excel</button>
    </div>`;
    return;
  }

  inf.textContent=`${sched.items.length} 個工項 · 來源：${sched.sheetName}`;

  // Build the gantt
  const dates=sched.dates||[];
  const td=today();

  let h=`<div class="sched-meta">
    <div class="meta-item">📋 <b>來源分頁</b>：${esc(sched.sheetName)}</div>
    <div class="meta-item">📅 <b>區間</b>：${dates.length?fmtS(dates[0])+' ～ '+fmtS(dates[dates.length-1])+' （'+dates.length+' 天）':'—'}</div>
    <div class="meta-item">👤 <b>上傳者</b>：${esc(sched.importedBy||'匿名')}</div>
    <div class="meta-item">🕐 <b>時間</b>：${esc(fmtDT(sched.importedAt))}</div>
    <div style="margin-left:auto;">
      <button class="btn bs bsm" onclick="clearSchedule()" style="color:#dc2626;">🗑 清除</button>
    </div>
  </div>

  <div class="sched-wrap"><table class="sched-tb">
    <thead>
      <tr>
        <th class="proj-h" rowspan="2">工程項目</th>
        <th class="dr-h" colspan="2">日期</th>
        <th class="days-h" rowspan="2">天數</th>`;
  dates.forEach(d=>{
    const dt=toDt(d),dow=dt.getDay();
    const isWk=dow===0||dow===6;
    const isTd=d===td;
    const cls=`date-h${isTd?' today':''}${isWk?' weekend':''}`;
    h+=`<th class="${cls}">${dt.getMonth()+1}/${dt.getDate()}</th>`;
  });
  h+=`</tr><tr>
        <th class="dr-h">開始</th>
        <th class="dr-h">結束</th>`;
  dates.forEach(d=>{
    const dt=toDt(d),dow=dt.getDay();
    const isWk=dow===0||dow===6;
    const isTd=d===td;
    const cls=`dow-h${isTd?' today':''}${isWk?' weekend':''}`;
    h+=`<th class="${cls}">${DOW[dow]}</th>`;
  });
  h+=`</tr></thead><tbody>`;

  let curCat='';
  sched.items.forEach((it,idx)=>{
    // Show category subheader when changes
    if(it.cat&&it.cat!==curCat){
      curCat=it.cat;
      h+=`<tr class="subhdr"><td colspan="${4+dates.length}">▸ ${esc(it.cat)}</td></tr>`;
    }
    h+=`<tr>
      <td class="proj-cell">${esc(it.name||'')}</td>
      <td class="dt-cell">${esc(fmtROC(it.start))}</td>
      <td class="dt-cell">${esc(fmtROC(it.end))}</td>
      <td class="days-cell">${it.days||'—'}</td>`;
    dates.forEach(d=>{
      const dt=toDt(d),dow=dt.getDay();
      const isWk=dow===0||dow===6;
      const isTd=d===td;
      const active=it.start&&it.end&&d>=it.start&&d<=it.end;
      const cls=`day-cell${isTd?' today':''}${isWk?' weekend':''}${active?' active':''}`;
      h+=`<td class="${cls}"></td>`;
    });
    h+=`</tr>`;
  });
  h+=`</tbody></table></div>`;
  host.innerHTML=h;

  // Scroll to today column if exists
  setTimeout(()=>{
    const todayCol=host.querySelector('.date-h.today');
    if(todayCol)todayCol.scrollIntoView({inline:'center',behavior:'smooth',block:'nearest'});
  },200);
}

// Format YYYY-MM-DD as ROC date 民國年/月/日
function fmtROC(s){
  if(!s)return '';
  const d=toDt(s);
  const y=d.getFullYear()-1911;
  return `${y}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

function clearSchedule(){
  if(!confirm('確定清除目前的進度表？此動作不會影響 Excel 原檔。'))return;
  S.schedule=null;save();renderStruct();
}

// ══════════ EXCEL IMPORT ══════════
function openExcelImport(){
  const xlsxReady=typeof XLSX!=='undefined';
  const statusBar=xlsxReady
    ? `<div style="font-size:11px;color:#16a34a;background:#f0fdf4;padding:6px 10px;border-radius:4px;border-left:3px solid #16a34a;">✓ Excel 解析函式庫已載入完成</div>`
    : `<div style="font-size:11px;color:#b45309;background:#fffbeb;padding:6px 10px;border-radius:4px;border-left:3px solid #b45309;">⏳ Excel 解析函式庫載入中... 若 5 秒後仍提示未載入，請重新整理頁面</div>`;

  const body=`<div class="f fc g3">
    <div style="font-size:12px;color:var(--mut);line-height:1.65;
      padding:10px 12px;background:#eff6ff;border-radius:6px;border-left:3px solid #2563eb;">
      <b style="color:#1e40af;">📋 上傳 Excel 進度表</b><br>
      支援 .xls / .xlsx 檔案。系統會自動解析包含「<b>工程項目、開始日期、結束日期</b>」欄位的甘特圖。
      <br><br>
      <b style="color:#92400e;">適用格式：</b><br>
      • 第 4 列為標題（類別、項次、工程項目、開始、結束、天數，後面跟日期）<br>
      • 第 5 列為星期（一、二、三...）<br>
      • 第 6 列開始為資料
    </div>

    ${statusBar}

    <input type="file" id="xlsFile" accept=".xls,.xlsx,.xlsm" style="display:none;">
    <button class="btn bp" style="padding:14px;font-size:15px;" onclick="document.getElementById('xlsFile').click()">
      📁 選擇 Excel 檔案
    </button>

    <div id="xlsStatus" style="font-size:12px;color:var(--mut);text-align:center;min-height:18px;"></div>
  </div>`;

  openModal('📤 上傳 Excel 進度表',body);
  document.getElementById('xlsFile').addEventListener('change',handleXlsFile);
}

function handleXlsFile(e){
  const file=e.target.files[0];if(!file)return;
  const status=document.getElementById('xlsStatus');

  if(typeof XLSX==='undefined'){
    status.innerHTML='⚠️ Excel 解析函式庫尚未載入完成<br><small>請稍候 5 秒後再試一次，或檢查網路連線</small>';
    status.style.color='#dc2626';
    // Try loading again
    if(typeof loadXlsxFallback==='function')loadXlsxFallback();
    return;
  }

  status.textContent='⏳ 讀取檔案中...';
  status.style.color='#2563eb';

  const reader=new FileReader();
  reader.onload=evt=>{
    try{
      const data=new Uint8Array(evt.target.result);
      const wb=XLSX.read(data,{type:'array',cellDates:true});
      status.textContent=`✓ 讀取成功，找到 ${wb.SheetNames.length} 個分頁`;
      status.style.color='#16a34a';
      setTimeout(()=>showSheetPicker(wb),300);
    }catch(err){
      console.error(err);
      status.textContent='✗ 讀取失敗：'+err.message;
      status.style.color='#dc2626';
    }
  };
  reader.onerror=()=>{
    status.textContent='✗ 檔案讀取錯誤';
    status.style.color='#dc2626';
  };
  reader.readAsArrayBuffer(file);
}

// Try to extract date from sheet name (e.g., "114.06.05" or "115.05.03")
function parseSheetDate(name){
  const m=name.match(/^(\d{2,3})[.\-](\d{1,2})[.\-](\d{1,2})/);
  if(!m)return null;
  const y=parseInt(m[1])+1911;
  return `${y}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
}

function showSheetPicker(wb){
  // Build list with parsed dates, sorted newest first
  const sheets=wb.SheetNames.map(name=>({name,date:parseSheetDate(name)}));
  // Sort: dated sheets first (newest), then undated
  const sorted=sheets.slice().sort((a,b)=>{
    if(a.date&&b.date)return b.date.localeCompare(a.date);
    if(a.date)return -1;
    if(b.date)return 1;
    return 0;
  });
  const recommended=sorted.find(s=>s.date);

  let h=`<div style="font-size:12px;color:var(--mut);line-height:1.6;
    padding:10px 12px;background:#eff6ff;border-radius:6px;border-left:3px solid #2563eb;margin-bottom:10px;">
    請選擇要匯入的分頁。系統已依日期排序，<b style="color:#2563eb;">⭐ 為最新版本</b>。
  </div>
  <div class="sheet-pick-list">`;

  sorted.forEach(s=>{
    const isRec=recommended&&s.name===recommended.name;
    const dateStr=s.date?` · 對應日期 ${s.date}`:'';
    h+=`<div class="sheet-pick-item ${isRec?'recommended':''}" onclick="pickSheet('${esc(s.name)}')">
      <div class="spi-name">${esc(s.name)}</div>
      <div class="spi-info">${dateStr}</div>
    </div>`;
  });
  h+=`</div>`;

  openModal('📋 選擇要匯入的分頁',h,true);

  // Stash workbook for later
  window._pendingWb=wb;
}

function pickSheet(sheetName){
  const wb=window._pendingWb;
  if(!wb)return;
  try{
    parseAndImportSheet(wb,sheetName);
    fclose();
    setTimeout(()=>{
      alert(`✓ 已成功匯入「${sheetName}」進度表`);
      renderStruct();
    },100);
  }catch(err){
    console.error(err);
    alert('解析失敗：'+err.message+'\n\n請確認 Excel 格式符合說明');
  }finally{
    delete window._pendingWb;
  }
}

function parseAndImportSheet(wb,sheetName){
  const sheet=wb.Sheets[sheetName];
  if(!sheet)throw new Error('分頁不存在');
  // Convert to AOA (array of arrays)
  // raw:true keeps Date objects (cellDates:true above ensures dates are Date objects, not numbers)
  const aoa=XLSX.utils.sheet_to_json(sheet,{header:1,raw:true,defval:null});
  if(aoa.length<6)throw new Error('資料列不足，至少需要 6 列');

  // Auto-detect header row by counting valid date cells in candidate rows
  // Find date columns. Try the standard layout first (col index 6 = G onward),
  // but also scan the whole header row in case the format differs.
  const dateCols=[]; // {colIdx, isoDate}

  // Try multiple potential header rows: row 4 (index 3), or row 3, or row 5
  let hdrRowIdx=3;
  let bestHdr=[];
  let bestDateCount=0;

  for(const tryIdx of [3,2,4,1,0]){
    const r=aoa[tryIdx];
    if(!r)continue;
    let cnt=0;
    for(let c=0;c<r.length;c++){
      if(extractIsoDate(r[c]))cnt++;
    }
    if(cnt>bestDateCount){bestDateCount=cnt;bestHdr=r;hdrRowIdx=tryIdx;}
  }

  if(bestDateCount===0){
    throw new Error('找不到日期欄位。請確認 Excel 標題列（通常是第 4 列）有日期欄位（例如 5/5、2026/05/05 等格式）');
  }

  for(let c=0;c<bestHdr.length;c++){
    const iso=extractIsoDate(bestHdr[c]);
    if(iso)dateCols.push({colIdx:c,iso});
  }

  // Determine where the actual data rows begin (usually 2 rows after header: data starts at hdrRow+2)
  const dataStartIdx=hdrRowIdx+2;
  if(aoa.length<=dataStartIdx)throw new Error('找不到資料列');

  // Parse data rows (start from index 5 = Row 6)
  const items=[];
  let curCat='';
  for(let r=dataStartIdx;r<aoa.length;r++){
    const row=aoa[r]||[];
    const cat=row[0]; // 類別
    const seq=row[1]; // 項次
    const name=row[2]; // 工程項目
    const startCell=row[3]; // 開始
    const endCell=row[4]; // 結束
    const daysCell=row[5]; // 天數

    if(cat&&typeof cat==='string'&&cat.trim()){
      curCat=cat.trim();
    }
    // Skip if no project name AND no seq
    if(!name||(typeof name==='string'&&!name.trim()))continue;

    const start=parseROCDate(startCell);
    const end=parseROCDate(endCell);
    if(!start||!end)continue;  // Skip rows without valid dates

    items.push({
      cat:curCat,
      seq:seq,
      name:String(name).trim(),
      start,end,
      days:daysCell
    });
  }

  if(!items.length)throw new Error('找不到有效的工項資料');

  // Save
  S.schedule={
    sheetName,
    importedAt:new Date().toISOString(),
    importedBy:localStorage.getItem('fbUser')||'匿名',
    dates:dateCols.map(c=>c.iso),
    items
  };
  save();
}

// Extract ISO date from any cell value (Date object, ROC string, ISO string, Excel serial, M/D string)
// Returns null if not a valid date.
function extractIsoDate(v){
  if(v==null||v==='')return null;

  // Date object (preferred — happens with cellDates:true + raw:true)
  if(v instanceof Date){
    if(isNaN(v.getTime()))return null;
    return toS(v);
  }

  // String formats
  if(typeof v==='string'){
    const s=v.trim();
    if(!s)return null;
    // ISO/Western with year: 2026-05-05 or 2026/5/5
    let m=s.match(/^(\d{4})[\-\/\.](\d{1,2})[\-\/\.](\d{1,2})/);
    if(m){
      const y=+m[1],mo=+m[2],d=+m[3];
      if(mo>=1&&mo<=12&&d>=1&&d<=31)
        return `${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    }
    // ROC year: 115/05/05 or 115.5.5
    m=s.match(/^(\d{2,3})[\/\.\-](\d{1,2})[\/\.\-](\d{1,2})/);
    if(m){
      const y=+m[1]+(+m[1]<200?1911:0);
      const mo=+m[2],d=+m[3];
      if(mo>=1&&mo<=12&&d>=1&&d<=31)
        return `${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    }
    // M/D without year (e.g., "5/5") — needs year context, skip here
    return null;
  }

  // Number (Excel serial date — days since 1899-12-30)
  if(typeof v==='number'){
    // Filter out unreasonable values (must be a sane date range: 1990-2100)
    if(v<32874||v>73415)return null;
    const d=new Date(Date.UTC(1899,11,30)+v*86400000);
    if(isNaN(d.getTime()))return null;
    return toS(d);
  }

  return null;
}

// Parse ROC date "115/05/05" or Date object → "2026-05-05"
function parseROCDate(v){
  return extractIsoDate(v);
}

function printSchedule(){

}

// ══════════ SAFETY ══════════
function renderSafety(){
  const sf=S.safety;
  const {floors,items,cells}=sf;

  // Count totals
  let totalSet=0,totalAll=floors.length*items.length;
  Object.values(cells).forEach(v=>{if(v)totalSet++;});
  document.getElementById('safInf').textContent=`${items.length} 項管制 × ${floors.length} 樓 · 已設置 ${totalSet}/${totalAll}（${Math.round(totalSet/totalAll*100)||0}%）`;

  let h=`<thead><tr><th class="tlf">管制項目 ↓ / 樓層 →</th>`;
  floors.forEach((fl,i)=>{
    h+=`<th draggable="true"
      ondragstart="dragStart(event,'safFl',${i})"
      ondragover="dragOver(event,'safFl',${i})"
      ondragleave="dragLeave(event)"
      ondrop="dragDrop(event,'safFl',${i},S.safety.floors,renderSafety)"
      ondragend="dragEnd(event)">
      <div class="hdrow">
        <span>${esc(fl)}</span>
        <button class="dotbtn" onclick="openSafFlMenu(event,${i})" title="選項">⋮</button>
      </div></th>`;
  });
  h+=`<th style="background:var(--bg);border:1px solid var(--bg3);padding:6px;">
    <button class="btn bt bsm" onclick="openAddSafFl()">＋ 樓層</button></th>
  </tr></thead><tbody>`;

  items.forEach((it,ii)=>{
    h+=`<tr><td class="tnm" draggable="true"
      ondragstart="dragStart(event,'safItem',${ii})"
      ondragover="dragOver(event,'safItem',${ii})"
      ondragleave="dragLeave(event)"
      ondrop="dragDrop(event,'safItem',${ii},S.safety.items,renderSafety)"
      ondragend="dragEnd(event)">
      <div class="hdrow lf">
        <span>${esc(it.name)}</span>
        <button class="dotbtn" onclick="openSafItemMenu(event,${ii})" title="選項">⋮</button>
      </div></td>`;
    floors.forEach(fl=>{
      const k=`${fl}_${it.id}`;
      const on=!!cells[k];
      h+=`<td class="saf-cell">
        <button class="saf-btn ${on?'on':'off'}" onclick="togSafCell('${esc(fl)}','${esc(it.id)}')" title="${on?'點擊改為未設置':'點擊改為已設置'}">${on?'✓':'✗'}</button>
      </td>`;
    });
    h+=`<td style="background:var(--bg);border:1px solid var(--bg3);"></td></tr>`;
  });

  h+=`<tr>
    <td style="background:var(--bg);border:1px solid var(--bg3);padding:6px;">
      <button class="btn bp bsm" onclick="openAddSafItem()">＋ 管制項目</button></td>
    ${floors.map(()=>`<td style="background:var(--bg);border:1px solid var(--bg3);"></td>`).join('')}
    <td style="background:var(--bg);border:1px solid var(--bg3);"></td>
  </tr></tbody>`;
  document.getElementById('safTb').innerHTML=h;
}

function togSafCell(fl,iid){
  const k=`${fl}_${iid}`;
  S.safety.cells[k]=!S.safety.cells[k];
  if(!S.safety.cells[k])delete S.safety.cells[k]; // keep object lean
  save();renderSafety();
}

// ── Add/edit/delete floors and items ──
function openAddSafFl(){
  openModal('新增樓層',`<div class="f fc g3">
    <label class="lbl">樓層名稱 <input id="safFlN" class="inp" placeholder="例：6F"></label>
    <div style="font-size:11px;color:var(--dim);">💡 可一次新增多個，用逗號分隔，例如：<code style="color:#2563eb;">6F, 7F, 8F</code></div>
    <button class="btn bp" style="padding:10px;" onclick="doAddSafFl()">新增</button>
  </div>`);
}
function doAddSafFl(){
  const inp=document.getElementById('safFlN').value;
  const names=inp.split(/[,，、\n]/).map(s=>s.trim()).filter(Boolean);
  if(!names.length){alert('請輸入樓層名稱');return;}
  const dupes=[],added=[];
  names.forEach(n=>{
    if(S.safety.floors.includes(n))dupes.push(n);
    else{S.safety.floors.push(n);added.push(n);}
  });
  if(!added.length){alert('全部都已存在：'+dupes.join('、'));return;}
  save();fclose();renderSafety();
}

function openAddSafItem(){
  openModal('新增管制項目',`<div class="f fc g3">
    <label class="lbl">項目名稱 <input id="safItN" class="inp" placeholder="例：洗手台"></label>
    <div style="font-size:11px;color:var(--dim);">💡 可一次新增多個，用逗號分隔</div>
    <button class="btn bp" style="padding:10px;" onclick="doAddSafItem()">新增</button>
  </div>`);
}
function doAddSafItem(){
  const inp=document.getElementById('safItN').value;
  const names=inp.split(/[,，、\n]/).map(s=>s.trim()).filter(Boolean);
  if(!names.length){alert('請輸入項目名稱');return;}
  const exists=S.safety.items.map(i=>i.name);
  const dupes=[],added=[];
  names.forEach(n=>{
    if(exists.includes(n))dupes.push(n);
    else{S.safety.items.push({id:'sf_'+uid(),name:n});added.push(n);}
  });
  if(!added.length){alert('全部都已存在：'+dupes.join('、'));return;}
  save();fclose();renderSafety();
}

function openSafFlMenu(e,i){
  const fl=S.safety.floors[i];
  openPop(e,{kind:'safFl',idx:i,axis:'h',arr:S.safety.floors,
    onReorder:renderSafety,
    onDelete:()=>delSafFl(fl),
    extras:[
      {label:'✏️ 重新命名', fn:()=>openRenameSafFl(fl)},
    ]});
}
function openRenameSafFl(fl){
  openModal(`重新命名樓層「${esc(fl)}」`,`<div class="f fc g3">
    <label class="lbl">新名稱 <input id="rsfn" class="inp" value="${esc(fl)}"></label>
    <button class="btn bp" style="padding:10px;" onclick="doRenameSafFl('${esc(fl)}')">儲存</button>
  </div>`);
}
function doRenameSafFl(oldFl){
  const newName=document.getElementById('rsfn').value.trim();
  if(!newName||newName===oldFl){fclose();return;}
  if(S.safety.floors.includes(newName)){alert('名稱重複');return;}
  const i=S.safety.floors.indexOf(oldFl);
  if(i<0)return;
  S.safety.floors[i]=newName;
  // Migrate cell keys
  const newCells={};
  Object.keys(S.safety.cells).forEach(k=>{
    if(k.startsWith(oldFl+'_'))newCells[newName+k.slice(oldFl.length)]=S.safety.cells[k];
    else newCells[k]=S.safety.cells[k];
  });
  S.safety.cells=newCells;
  save();fclose();renderSafety();
}
function delSafFl(fl){
  if(!confirm(`確定刪除「${fl}」這個樓層及其所有資料？`))return;
  S.safety.floors=S.safety.floors.filter(x=>x!==fl);
  Object.keys(S.safety.cells).forEach(k=>{
    if(k.startsWith(fl+'_'))delete S.safety.cells[k];
  });
  save();renderSafety();
}

function openSafItemMenu(e,i){
  const it=S.safety.items[i];
  openPop(e,{kind:'safItem',idx:i,axis:'v',arr:S.safety.items,
    onReorder:renderSafety,
    onDelete:()=>delSafItem(it.id),
    extras:[
      {label:'✏️ 重新命名', fn:()=>openRenameSafItem(it.id)},
    ]});
}
function openRenameSafItem(iid){
  const it=S.safety.items.find(x=>x.id===iid);if(!it)return;
  openModal(`重新命名「${esc(it.name)}」`,`<div class="f fc g3">
    <label class="lbl">新名稱 <input id="rsin" class="inp" value="${esc(it.name)}"></label>
    <button class="btn bp" style="padding:10px;" onclick="doRenameSafItem('${esc(iid)}')">儲存</button>
  </div>`);
}
function doRenameSafItem(iid){
  const it=S.safety.items.find(x=>x.id===iid);if(!it)return;
  const newName=document.getElementById('rsin').value.trim();
  if(!newName||newName===it.name){fclose();return;}
  if(S.safety.items.some(x=>x.name===newName&&x.id!==iid)){alert('名稱重複');return;}
  it.name=newName;
  save();fclose();renderSafety();
}
function delSafItem(iid){
  const it=S.safety.items.find(x=>x.id===iid);if(!it)return;
  if(!confirm(`確定刪除管制項目「${it.name}」及其所有資料？`))return;
  S.safety.items=S.safety.items.filter(x=>x.id!==iid);
  Object.keys(S.safety.cells).forEach(k=>{
    if(k.endsWith('_'+iid))delete S.safety.cells[k];
  });
  save();renderSafety();
}

function printSafety(){
  if(!S.safety.items.length||!S.safety.floors.length){alert('請先設定管制項目與樓層');return;}
  document.body.classList.add('print-saf');
  setTimeout(()=>{window.print();},80);
}

function openPrintFilter(){
  const {floors,trades}=R();
  const title=_renovKey==='indoor'?'室內裝修':'室外裝修';
  const body=`<div class="f fc g3">
    <div style="font-size:12px;color:var(--mut);line-height:1.6;
      padding:10px 12px;background:var(--bg);border-radius:6px;border-left:3px solid #38bdf8;">
      <b style="color:#7dd3fc;">📄 自選 PDF 匯出範圍</b><br>
      勾選要匯出的樓層和工種，未勾選的不會出現在 PDF 中。
    </div>

    <div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
        <span style="font-size:13px;color:var(--txt);font-weight:700;">📍 樓層</span>
        <button class="btn bs bsm" onclick="pfSelAll('fl',1)">全選</button>
        <button class="btn bs bsm" onclick="pfSelAll('fl',0)">全不選</button>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;max-height:180px;overflow-y:auto;
        padding:10px;background:#f1f5f9;border-radius:6px;border:1px solid var(--bg3);">
        ${floors.map(fl=>`
          <label style="display:flex;align-items:center;gap:6px;background:#fff;
            padding:8px 14px;border-radius:6px;border:1px solid #cbd5e1;cursor:pointer;
            font-size:13px;user-select:none;transition:background .12s,border-color .12s;"
            onmouseover="this.style.background='#eff6ff';this.style.borderColor='#60a5fa';"
            onmouseout="this.style.background='#fff';this.style.borderColor='#cbd5e1';">
            <input type="checkbox" class="pfCkFl" data-name="${esc(fl)}" checked
              style="accent-color:#2563eb;cursor:pointer;width:15px;height:15px;">
            <span style="color:#0f172a;font-weight:600;">${esc(fl)}</span>
          </label>`).join('')}
      </div>
    </div>

    <div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
        <span style="font-size:13px;color:var(--txt);font-weight:700;">🔨 工種</span>
        <button class="btn bs bsm" onclick="pfSelAll('tr',1)">全選</button>
        <button class="btn bs bsm" onclick="pfSelAll('tr',0)">全不選</button>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;max-height:180px;overflow-y:auto;
        padding:10px;background:#f1f5f9;border-radius:6px;border:1px solid var(--bg3);">
        ${trades.map(tr=>`
          <label style="display:flex;align-items:center;gap:6px;background:#fff;
            padding:8px 14px;border-radius:6px;border:1px solid #cbd5e1;cursor:pointer;
            font-size:13px;user-select:none;transition:background .12s,border-color .12s;"
            onmouseover="this.style.background='#eff6ff';this.style.borderColor='#60a5fa';"
            onmouseout="this.style.background='#fff';this.style.borderColor='#cbd5e1';">
            <input type="checkbox" class="pfCkTr" data-id="${esc(tr.id)}" checked
              style="accent-color:#2563eb;cursor:pointer;width:15px;height:15px;">
            <span style="color:#0f172a;font-weight:600;">${esc(tr.name)}</span>

      <button class="btn bp" style="flex:2;padding:11px;" onclick="doFilteredPrint()">📄 匯出 PDF</button>

function pfSelAll(kind,state){
  const sel=kind==='fl'?'.pfCkFl':'.pfCkTr';
  document.querySelectorAll(sel).forEach(c=>c.checked=!!state);
}

function doFilteredPrint(){
  const selFloors=Array.from(document.querySelectorAll('.pfCkFl:checked')).map(c=>c.dataset.name);
  const selTrades=Array.from(document.querySelectorAll('.pfCkTr:checked')).map(c=>c.dataset.id);
  if(!selFloors.length||!selTrades.length){
    alert('請至少選擇一個樓層和一個工種');return;
  }
  fclose();

  // Find indices to hide
  const {floors,trades}=R();
  const flIdx=floors.map((f,i)=>selFloors.includes(f)?-1:i).filter(i=>i>=0);
  const trIdx=trades.map((t,i)=>selTrades.includes(t.id)?-1:i).filter(i=>i>=0);

  // Mark hidden columns and rows in the table
  const tbl=document.getElementById('rtb');
  const headRow=tbl.querySelector('thead tr');
  const bodyRows=tbl.querySelectorAll('tbody tr');

  // Hide trade rows (each tr in body except last "+工種" row)
  // The last row is the "add" row, we always hide it for print anyway
  trades.forEach((tr,i)=>{
    if(!selTrades.includes(tr.id)){
      bodyRows[i]&&bodyRows[i].classList.add('hide-print');
    }
  });
  // Hide the "+ 工種" row at the bottom
  if(bodyRows[trades.length])bodyRows[trades.length].classList.add('hide-print');

  // Hide floor columns: in each row, mark TDs with index = flIdx + 1 (because of leading TD)
  flIdx.forEach(i=>{
    // Header
    const th=headRow.children[i+1];
    if(th)th.classList.add('hide-print');
    // Each body row
    bodyRows.forEach(tr=>{
      const td=tr.children[i+1];
      if(td)td.classList.add('hide-print');
    });
  });
  // Hide last column ("+ 樓層")
  const lastIdx=floors.length+1;
  if(headRow.children[lastIdx])headRow.children[lastIdx].classList.add('hide-print');
  bodyRows.forEach(tr=>{
    if(tr.children[lastIdx])tr.children[lastIdx].classList.add('hide-print');
  });

  // Trigger print
  document.body.classList.add('print-renov');
  setTimeout(()=>{window.print();},80);
}

function printCell(){
  document.body.classList.add('print-cell');
  setTimeout(()=>{window.print();},60);
}
window.addEventListener('afterprint',()=>{
  document.body.classList.remove('print-renov','print-cell','print-sched','print-saf');
  // Clean up filter classes
  document.querySelectorAll('.hide-print').forEach(el=>el.classList.remove('hide-print'));
});
